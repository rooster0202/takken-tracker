<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1f6f5b">
    <title>宅建士 問題チェック</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">宅建士問題集</p>
          <h1>問題チェック</h1>
        </div>
        <div class="header-actions">
          <a class="nav-button" href="./dashboard.html">分析</a>
          <div class="save-state" id="saveState" role="status" aria-live="polite">保存済み</div>
        </div>
      </header>

      <section class="summary" aria-label="全体の集計">
        <div class="summary-card">
          <span class="summary-label">評価済み</span>
          <strong id="ratedTotal">0</strong>
          <span id="totalCount">/ 332</span>
        </div>
        <div class="summary-card mark-good">
          <span class="summary-label">○</span>
          <strong id="goodTotal">0</strong>
        </div>
        <div class="summary-card mark-ok">
          <span class="summary-label">△</span>
          <strong id="okTotal">0</strong>
        </div>
        <div class="summary-card mark-bad">
          <span class="summary-label">×</span>
          <strong id="badTotal">0</strong>
        </div>
      </section>

      <nav class="chapter-tabs" id="chapterTabs" aria-label="章を選択"></nav>

      <section class="chapter-panel" aria-labelledby="chapterTitle">
        <div class="chapter-head">
          <div>
            <h2 id="chapterTitle">Chapter1</h2>
            <p id="chapterProgress">0 / 122 評価済み</p>
          </div>
          <div class="chapter-counts" id="chapterCounts"></div>
        </div>

        <div class="toolbar" aria-label="操作">
          <label class="filter">
            <span>表示</span>
            <select id="filterSelect">
              <option value="all">すべて</option>
              <option value="blank">未評価</option>
              <option value="good">○のみ</option>
              <option value="ok">△のみ</option>
              <option value="bad">×のみ</option>
            </select>
          </label>
          <button type="button" id="resetButton">リセット</button>
        </div>

        <div class="question-grid" id="questionGrid" aria-label="問題一覧"></div>
      </section>
    </main>

    <template id="questionTemplate">
      <article class="question-card">
        <div class="question-meta">
          <div class="question-number"></div>
          <div class="question-topic"></div>
        </div>
        <div class="rating-buttons" role="group">
          <button type="button" class="rate-button good" data-rating="good" aria-label="丸">○</button>
          <button type="button" class="rate-button ok" data-rating="ok" aria-label="三角">△</button>
          <button type="button" class="rate-button bad" data-rating="bad" aria-label="バツ">×</button>
        </div>
        <label class="note-field">
          <span>メモ</span>
          <input type="text" class="note-input" placeholder="復習メモを追記">
        </label>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
